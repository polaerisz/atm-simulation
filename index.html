<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATM Simulator</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gradient-to-br from-slate-900 to-black flex justify-center items-center h-screen">

<div class="atm">

    <div id="intro">
    <div class="intro-content">
        <img src="bank.png" alt="Bank logo with moon on the background">
        <h1 class="welcome">Welcome to BBank</h1>
    </div>
</div>

<!-- CARD SELECT -->
<div class="screen active" id="cardSelect">

<h2 class="card-title">Select Card</h2>

<div class="card-list">

<button onclick="chooseCard(0)" class="bank-card">
<div class="card-chip"></div>
<p class="bank-name">World Bank</p>
<p class="card-number">•••• 1111</p>
</button>

<button onclick="chooseCard(1)" class="bank-card">
<div class="card-chip"></div>
<p class="bank-name">World Bank</p>
<p class="card-number">•••• 2222</p>
</button>

</div>

</div>


<!-- INSERT -->
<div class="screen" id="insert">

<div class="slot">
<div class="card" id="card"></div>
</div>

<button class="insert-btn" onclick="insertCard()">INSERT</button>

</div>


<!-- PIN -->
<div class="screen" id="pin">

<h2>Enter PIN</h2>

<div id="pinDisplay" class="display"></div>
<div id="pinError" class="error"></div>

<div id="pinPad" class="keypad"></div>

<button class="enterB" onclick="submitPin()">Enter</button>

</div>

<!-- WELCOME -->
<div class="screen" id="welcome">

<h2 class="greetingz">Welcome</h2>
<p class="welcoming" id="welcomeUser">Access Granted</p>

<div class="loader"></div>

</div>

<div class="screen" id="menu">

<h2 class="menu-title">BBank ATM</h2>

<div class="account-panel">
<p id="balance" class="balance-display"></p>
</div>

<div class="menu-grid">

<button class="menu-btn withdraw" onclick="openWithdraw()">
💵 Withdraw Cash
</button>

<button class="menu-btn balance" onclick="showBalance()">
📊 Check Balance
</button>

<button class="menu-btn exit" onclick="finishTransaction()">⏹ End Transaction</button>


</div>

</div>

<!-- WITHDRAW -->
<div class="screen" id="withdraw">

<h2 class="selector">Select Amount</h2>

<div class="amount-grid">

<button onclick="withdraw(500)">₱500</button>
<button onclick="withdraw(1000)">₱1000</button>
<button onclick="withdraw(2000)">₱2000</button>
<button onclick="withdraw(5000)">₱5000</button>

</div>

<h3 class="selector">Custom Amount</h3>

<div id="amountDisplay" class="display"></div>
<div id="amountPad" class="keypad"></div>

<div class="action-buttons-row">
    <button class="submitB" onclick="submitCustom()">Withdraw</button>
    <button class="backB" onclick="goMenu()">Back</button>
</div>
</div>


<!-- PROCESS -->
<div class="screen" id="process">

<h2>Processing</h2>
<div class="loader"></div>

</div>


<!-- DISPENSE -->
<div class="screen" id="dispense">

<h2>Dispensing Cash</h2>

<div class="cash-slot">
<div class="cash" id="cash"></div>
</div>

</div>


<!-- RECEIPT -->
<div class="screen" id="receipt">

<h2>Printing Receipt</h2>

<div class="printer">
<div class="paper" id="receiptPaper"></div>
</div>

</div>

<div class="screen" id="another">
  <h2>Another Transaction?</h2>

  <div class="menu-grid">
    <button class="menu-btn withdraw" onclick="anotherYes()">✔ Yes</button>
    <button class="menu-btn exit" onclick="finishTransaction()">✖ No</button>
  </div>
</div>
<!-- FINISH -->
<div class="screen" id="finish">

<h2>Take Cash</h2>
<p>Please remove card</p>

<button onclick="ejectCard()">Finish</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
